<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UnColor</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="header">
    <span class="logo" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 11V4a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v7" />
        <path d="m12 11 8 8" />
        <path d="M5 14a7 7 0 0 0 7 7" />
        <line x1="3" y1="3" x2="21" y2="21" />
      </svg>
    </span>
    <h1 class="title">UnColor</h1>
  </header>

  <main class="content">
    <label class="field-label" for="input">Text einfügen</label>
    <textarea id="input" class="textarea" placeholder="Text hier einfügen…" spellcheck="false"></textarea>

    <div class="actions">
      <button id="clean" class="btn btn-primary" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z" />
          <path d="m9 12 2 2 4-4" />
        </svg>
        Bereinigen
      </button>
      <button id="copy" class="btn" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
        </svg>
        Kopieren
      </button>
      <button id="clear" class="btn btn-ghost" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 6h18" />
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
        </svg>
        Leeren
      </button>
    </div>

    <p id="status" class="status" role="status" aria-live="polite"></p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
